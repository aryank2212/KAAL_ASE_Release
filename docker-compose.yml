services:
  api:
    build:
      context: ./services/api
    environment:
      DATABASE_URL: postgresql+psycopg://kaal:kaal@postgres:5432/kaal_ase
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: kaalpassword
      QDRANT_URL: http://qdrant:6333
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_BUCKET: kaal-evidence
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: gemma4:latest
      OLLAMA_EMBED_MODEL: nomic-embed-text
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - neo4j
      - qdrant
      - minio

  worker:
    build:
      context: ./services/api
    command: python -m app.workers.ingestion_worker
    profiles:
      - worker
    environment:
      DATABASE_URL: postgresql+psycopg://kaal:kaal@postgres:5432/kaal_ase
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: kaalpassword
      QDRANT_URL: http://qdrant:6333
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_BUCKET: kaal-evidence
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: gemma4:latest
      OLLAMA_EMBED_MODEL: nomic-embed-text
    depends_on:
      - postgres

  web:
    build:
      context: ./services/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: kaal
      POSTGRES_PASSWORD: kaal
      POSTGRES_DB: kaal_ase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/kaalpassword
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniopassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
  minio_data:
